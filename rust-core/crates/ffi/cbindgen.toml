# cbindgen configuration for Screen Dream FFI
# See https://github.com/mozilla/cbindgen/blob/master/docs.md

language = "C"
header = "/* Screen Dream FFI — auto-generated by cbindgen. DO NOT EDIT. */"
include_guard = "SCREEN_DREAM_FFI_H"
tab_width = 4
style = "both"
cpp_compat = true

# Only process the ffi crate itself (not dependencies).
[parse]
parse_deps = false

[export]
# Only export items prefixed with SD or sd_.
prefix = ""
include = []
exclude = []

[fn]
# Keep the original names (sd_* prefix is already in the Rust source).
rename_args = "None"
